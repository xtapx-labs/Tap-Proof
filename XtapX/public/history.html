<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XtapX — Product History</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

  <nav class="nav">
    <a href="/" class="nav-brand">Xtap<span>X</span></a>
    <ul class="nav-links">
      <li><a href="/">Home</a></li>
      <li><a href="/register">Register</a></li>
    </ul>
  </nav>

  <div class="container" id="app">
    <div class="loading-screen">
      <div class="spinner"></div>
      <p>Loading product history...</p>
    </div>
  </div>

  <footer class="footer">
    <p><span class="footer-brand">XtapX Labs</span> · CalgaryHacks 2026</p>
  </footer>

  <script src="/js/common.js"></script>
  <script>
    async function init() {
      const params = getParams();
      const uid = params.uid;

      if (!uid) {
        document.getElementById('app').innerHTML = `
          <div class="result-banner error">
            <div class="result-icon">🔍</div>
            <div class="result-title">No Product Selected</div>
            <div class="result-subtitle">Search by UID or tap a product to view its history.</div>
          </div>
          <div class="card">
            <div class="form-group">
              <label class="form-label">Product UID</label>
              <input type="text" class="form-input" id="search-uid" placeholder="e.g. 04A23B1C2D3E4F">
            </div>
            <button class="btn btn-primary" onclick="searchUID()">View History</button>
          </div>`;
        return;
      }

      try {
        const data = await api(`/api/history/${uid}`);
        renderHistory(data, uid);
      } catch (err) {
        document.getElementById('app').innerHTML = `
          <div class="result-banner error">
            <div class="result-icon">❌</div>
            <div class="result-title">Product Not Found</div>
            <div class="result-subtitle">No product with UID "${uid}" exists.</div>
          </div>
          <a href="/history" class="btn btn-outline" style="margin-top: 20px;">Search Again</a>`;
      }
    }

    function searchUID() {
      const uid = document.getElementById('search-uid').value.trim();
      if (uid) window.location.href = `/history?uid=${uid}`;
    }

    function renderHistory(data, uid) {
      const p = data.product || {};
      const app = document.getElementById('app');

      app.innerHTML = `
        <!-- Product Header -->
        <div class="product-card">
          <div class="product-image">
            ${p.image ? `<img src="${p.image}" alt="${p.name}">` : '📦'}
          </div>
          <div class="product-info">
            <h2>${p.name || 'Unknown Product'}</h2>
            <div class="brand">${p.brand || 'Unknown Brand'}</div>
            ${p.sku ? `<div class="sku">SKU: ${p.sku}</div>` : ''}
            <div class="sku" style="margin-top: 4px;">UID: ${uid}</div>
          </div>
        </div>

        <!-- Stats -->
        <div class="card">
          <div class="section-title">Verification Stats</div>
          <div class="deed-row">
            <span class="deed-label">Total Scans</span>
            <span class="deed-value">${data.total_scans || 0}</span>
          </div>
          <div class="deed-row">
            <span class="deed-label">Authentic</span>
            <span class="deed-value valid">${data.stats?.authentic || 0}</span>
          </div>
          <div class="deed-row">
            <span class="deed-label">Suspicious</span>
            <span class="deed-value warning">${data.stats?.suspicious || 0}</span>
          </div>
          <div class="deed-row">
            <span class="deed-label">Counterfeit Attempts</span>
            <span class="deed-value invalid">${data.stats?.counterfeit || 0}</span>
          </div>
          <div class="deed-row">
            <span class="deed-label">Last Counter</span>
            <span class="deed-value">${data.last_counter || 0}</span>
          </div>
          <div class="deed-row">
            <span class="deed-label">Current Owner</span>
            <span class="deed-value">${data.current_owner ? maskEmail(data.current_owner) : 'Unclaimed'}</span>
          </div>
          <div class="deed-row">
            <span class="deed-label">Status</span>
            <span class="deed-value">${resultBadge(data.status === 'flagged' ? 'suspicious' : 'authentic')}</span>
          </div>
          <div class="deed-row">
            <span class="deed-label">Registered</span>
            <span class="deed-value">${formatDate(data.registered_at)}</span>
          </div>
        </div>

        <!-- Provenance Chain -->
        <div class="card">
          <div class="section-title">Provenance Chain</div>
          <div class="provenance-chain">
            ${renderProvenance(data.provenance)}
          </div>
        </div>

        <!-- Scan Ledger -->
        <div class="card">
          <div class="section-title">Scan Ledger</div>
          ${renderScanTable(data.scan_ledger)}
        </div>

        <a href="/" class="btn btn-outline" style="margin-top: 16px;">Back to Home</a>
      `;
    }

    function renderProvenance(provenance) {
      if (!provenance || provenance.length === 0) {
        return '<p style="color: var(--text-dim); font-size: 13px;">No provenance data yet.</p>';
      }
      const actionLabels = {
        registered:  '📋 Registered',
        claimed:     '🤝 Claimed',
        transferred: '🔄 Transferred',
        released:    '📤 Released',
      };
      return provenance.map((p, i) => `
        <div class="provenance-event ${i === provenance.length - 1 ? 'current' : ''}">
          <div class="provenance-date">${formatDateShort(p.date)}</div>
          <div class="provenance-action">${actionLabels[p.type || p.action] || p.type || p.action}</div>
          <div class="provenance-actor">${maskEmail(p.actor || p.owner)}</div>
          <div class="provenance-counter">counter: ${p.counter}</div>
        </div>`).join('');
    }

    function renderScanTable(scans) {
      if (!scans || scans.length === 0) {
        return '<p style="color: var(--text-dim); font-size: 13px;">No scans recorded yet.</p>';
      }
      return `
        <div style="overflow-x: auto;">
          <table class="scan-table">
            <thead>
              <tr>
                <th>Time</th>
                <th>Counter</th>
                <th>Result</th>
                <th>Detail</th>
              </tr>
            </thead>
            <tbody>
              ${scans.map(s => `
                <tr>
                  <td>${formatDate(s.time)}</td>
                  <td>${s.counter}</td>
                  <td>${resultBadge(s.result)}</td>
                  <td style="font-family: var(--font); max-width: 200px; overflow: hidden; text-overflow: ellipsis;">${s.reason || '—'}</td>
                </tr>`).join('')}
            </tbody>
          </table>
        </div>`;
    }

    init();
  </script>

</body>
</html>
